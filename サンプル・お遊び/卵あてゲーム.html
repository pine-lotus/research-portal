<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卵あてゲーム</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #2b2b3c;
    font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif;
    overflow: hidden;
    user-select: none;
  }
  #wrap {
    position: relative;
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    background: #87ceeb;
    max-width: 100%; max-height: 100%;
    box-shadow: 0 0 30px rgba(0,0,0,.5);
    image-rendering: auto;
  }
  /* オーバーレイ画面（スタート・ゲームオーバー） */
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #fff; text-align: center;
    background: rgba(0,0,0,.55);
    backdrop-filter: blur(2px);
  }
  .overlay.hidden { display: none; }
  .overlay h1 { font-size: 44px; margin: 0 0 8px; text-shadow: 3px 3px 0 #d23; }
  .overlay h2 { font-size: 26px; margin: 6px 0; }
  .overlay p  { font-size: 18px; margin: 6px 0; line-height: 1.6; }
  .key {
    display: inline-block; background:#fff; color:#222;
    border-radius:6px; padding:2px 10px; margin:0 3px;
    font-weight:bold; box-shadow:0 2px 0 #999;
  }
  .btn {
    margin-top: 18px; font-size: 22px; font-weight: bold;
    background: #ffd23f; color: #5a3d00;
    border: none; border-radius: 12px; padding: 12px 34px;
    cursor: pointer; box-shadow: 0 4px 0 #c79a00;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #c79a00; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="960" height="600"></canvas>

  <!-- スタート画面 -->
  <div id="startScreen" class="overlay">
    <h1>🥚 卵あてゲーム</h1>
    <p>ビルの上から卵を落として、道ゆく人や車に当てよう！</p>
    <p>
      <span class="key">←</span><span class="key">→</span> で移動
      <span class="key">スペース</span> で卵を落とす
    </p>
    <p>制限時間内に目標点に届けば次のレベルへ。<br>Level1 → 50、その先はエンドレス！</p>
    <button class="btn" id="startBtn">スタート</button>
  </div>

  <!-- ゲームオーバー画面 -->
  <div id="overScreen" class="overlay hidden">
    <h1>GAME OVER</h1>
    <h2 id="overReach"></h2>
    <p id="overScore"></p>
    <p id="overBest"></p>
    <button class="btn" id="retryBtn">もう一度</button>
  </div>
</div>

<script>
"use strict";
/* =========================================================
   卵あてゲーム
   - 主人公（8歳の男の子）がビルの屋上を左右に移動
   - スペースで卵を落とす（連射OK）
   - 道路を行き交う人・車に卵を当てて得点
   - 制限時間内に目標点で次レベルへ。Level1〜50＋エンドレス
   ========================================================= */

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = canvas.width;   // 960
const H = canvas.height;  // 600

// 街並みのレイアウト（縦方向の役割分担）
const ROOF_Y = 250;       // 屋上の床（主人公が立つ高さ）の目安
const ROAD_TOP = 430;     // 道路の上端
const ROAD_BOTTOM = 560;  // 道路の下端（ここまで卵が落ちる）

// ---- ゲーム状態 ----
let state = "start";      // start / play / over
let level = 1;
let score = 0;
let levelStartScore = 0;  // このレベル開始時のスコア
let timeLeft = 0;         // 残り時間（秒）
let best = Number(localStorage.getItem("eggBest") || 0);

// 主人公
const hero = {
  x: W/2, y: ROOF_Y, w: 46, h: 70,
  speed: 9, dir: 0, face: 1,  // face: 1=右向き, -1=左向き（移動速度）
  walkPhase: 0,               // 歩行アニメ用の位相
  armRaise: 0                 // 卵を落とす瞬間の腕モーション(秒)
};
let clock = 0;                // 全体のアニメ時計(ms)

let eggs = [];     // 落下中の卵
let targets = [];  // 道を行き交う対象
let pops = [];     // 得点ポップや「うぎゃ」演出
let splats = [];   // 割れた卵（目玉焼き風）の跡

let spawnTimer = 0;
let lastTime = 0;
let policeCountdown = -1;  // 警察の出現までの残りms（-1=出さない）
let mayorCountdown = -1;   // 市長の出現までの残りms（-1=出さない）

// ---- 対象の種類定義 ----
// speed は基準スピード（レベルで倍率がかかる）
const KINDS = [
  // --- 歩く人たち（バリエーション） ---
  { type:"walker",  points:100,  w:34, h:62, speed:1.1, weight:0.5 },  // 一般人
  { type:"madam",   points:100,  w:38, h:64, speed:0.9, weight:0.4 },  // マダム
  { type:"skater",  points:150,  w:50, h:62, speed:3.2, weight:0.4 },  // スケーターボーイ(速い)
  { type:"police",  points:200,  w:36, h:64, speed:1.2, weight:0 },    // 警察(1ステージ1人・特別出現)
  { type:"mayor",   points:1000, w:42, h:72, speed:0.8, weight:0 },    // 市長(超レア・特別出現)
  // --- 乗り物 ---
  { type:"bike",    points:20, w:60, h:62, speed:1.8, color:"#3bbf6e", weight:0.8 },
  { type:"luup",    points:30, w:48, h:64, speed:2.4, color:"#ff7ab8", weight:0.8 },
  { type:"car",     points:30, w:120,h:54, speed:2.4, color:"#e74c3c", weight:1.2 },
  { type:"bus",     points:15, w:180,h:74, speed:1.4, color:"#f4b400", weight:0.7 },
  { type:"sports",  points:50, w:140,h:46, speed:3.8, color:"#8e44ad", weight:0.6 },
];
function kindByType(tp){ return KINDS.find(k=>k.type===tp); }

// ---- レベルごとの設定を計算する ----
// レベルが上がるほど：目標点UP・制限時間DOWN・スピードUP・出現頻度UP
function levelConfig(lv){
  const speedMul = 1 + (lv - 1) * 0.07;            // スピード倍率
  const spawnEvery = Math.max(420, 1100 - lv * 22); // 出現間隔(ms)：短いほど多い
  const target = 80 + (lv - 1) * 45;                // このレベルで稼ぐ目標点
  const time = Math.max(18, 30 - Math.floor(lv/3)); // 制限時間(秒・最大30)
  return { speedMul, spawnEvery, target, time };
}

// =========================================================
//  入力（キーボード）
// =========================================================
const keys = {};
window.addEventListener("keydown", (e)=>{
  if(["ArrowLeft","ArrowRight"," ","Spacebar"].includes(e.key)) e.preventDefault();
  if(e.repeat) return;
  keys[e.key] = true;
  if(state==="play" && (e.key===" "||e.key==="Spacebar")) dropEgg();
});
window.addEventListener("keyup", (e)=>{ keys[e.key] = false; });

document.getElementById("startBtn").onclick = startGame;
document.getElementById("retryBtn").onclick = startGame;

// =========================================================
//  ゲーム進行
// =========================================================
function startGame(){
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("overScreen").classList.add("hidden");
  state = "play";
  level = 1; score = 0;
  hero.x = W/2;
  eggs = []; targets = []; pops = []; splats = [];
  startLevel(1);
  lastTime = performance.now();
  requestAnimationFrame(loop);
}

function startLevel(lv){
  level = lv;
  levelStartScore = score;
  const cfg = levelConfig(lv);
  timeLeft = cfg.time;
  spawnTimer = 0;
  // 警察：1ステージに1人、ランダムなタイミングで出す
  policeCountdown = 2000 + Math.random() * (cfg.time*1000 - 4000);
  // 市長：10ステージに1回くらい（=毎ステージ10%の確率）。出る場合のみカウント設定
  mayorCountdown = (Math.random() < 0.10) ? 3000 + Math.random()*(cfg.time*1000 - 5000) : -1;
  // レベル開始の合図ポップ（時間帯つき）
  pops.push({ text:`LEVEL ${lv}  - ${getTheme(lv).name} -`, x:W/2, y:H/2-40, life:1.4, big:true, color:"#fff" });
}

function nextLevelCheck(){
  const cfg = levelConfig(level);
  if(score - levelStartScore >= cfg.target){
    startLevel(level + 1);
  }
}

function gameOver(){
  state = "over";
  if(score > best){ best = score; localStorage.setItem("eggBest", best); }
  document.getElementById("overReach").textContent = `Level ${level} まで到達`;
  document.getElementById("overScore").textContent = `スコア：${score} 点`;
  document.getElementById("overBest").textContent = `ベスト：${best} 点`;
  document.getElementById("overScreen").classList.remove("hidden");
}

// =========================================================
//  卵を落とす
// =========================================================
// 割れた卵（目玉焼き風）を作る。onTarget=人や車にベチョッと付いたか
function makeSplat(x, y, onTarget){
  // 白身のデコボコ形を乱数で生成（毎回ちがう形に）
  const n = 9, blob = [];
  for(let i=0;i<n;i++){
    blob.push(0.7 + Math.random()*0.6);  // 各方向の半径倍率
  }
  splats.push({
    x, y, life: onTarget ? 1.4 : 1.1, maxLife: onTarget ? 1.4 : 1.1,
    size: onTarget ? 22 : 26,
    blob, onTarget,
    drips: [Math.random()*0.5, Math.random()*0.5+0.5]  // 垂れ
  });
}

function dropEgg(){
  hero.armRaise = 0.25;   // 腕を前に出すモーション
  eggs.push({
    x: hero.x + hero.face*18,
    y: hero.y + hero.h - 6,
    vy: 0,
    r: 9
  });
}

// =========================================================
//  対象を出現させる
// =========================================================
function spawnTarget(forcedType){
  const cfg = levelConfig(level);
  let k;
  if(forcedType){
    k = kindByType(forcedType);
  } else {
    // 出現確率を重みづけ（weight=0 の特別キャラは通常出現しない）
    const totalW = KINDS.reduce((s,x)=>s+(x.weight||0), 0);
    let pick = Math.random()*totalW; k = KINDS[0];
    for(const x of KINDS){ const w=x.weight||0; pick -= w; if(w>0 && pick <= 0){ k = x; break; } }
  }
  const fromLeft = Math.random() < 0.5;
  const speed = k.speed * cfg.speedMul * (0.9 + Math.random()*0.2);
  // 大きいもの（バス等）は道路の下寄り、人は上寄りに少しばらけさせる
  const laneY = ROAD_TOP + 20 + Math.random() * (ROAD_BOTTOM - ROAD_TOP - 30);
  targets.push({
    kind: k,
    x: fromLeft ? -k.w : W + k.w,
    y: laneY,
    dir: fromLeft ? 1 : -1,
    speed,
    w: k.w, h: k.h,
    dead: false, deadTimer: 0
  });
}

// =========================================================
//  メインループ
// =========================================================
function loop(now){
  const dt = Math.min(50, now - lastTime); // 1フレームの経過ms（上限つき）
  lastTime = now;
  if(state==="play"){
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }
}

function update(dt){
  const cfg = levelConfig(level);
  clock += dt;
  if(hero.armRaise > 0) hero.armRaise -= dt/1000;

  // 残り時間
  timeLeft -= dt/1000;
  if(timeLeft <= 0){
    // 時間切れ：目標未達ならゲームオーバー
    if(score - levelStartScore >= cfg.target){ startLevel(level+1); }
    else { gameOver(); return; }
  }

  // 主人公の移動
  let mv = 0;
  if(keys["ArrowLeft"]) { mv -= 1; hero.face = -1; }
  if(keys["ArrowRight"]){ mv += 1; hero.face =  1; }
  hero.x += mv * hero.speed;
  hero.x = Math.max(hero.w/2, Math.min(W - hero.w/2, hero.x));
  if(mv !== 0) hero.walkPhase += 0.25;   // 動いている時だけ足を動かす

  // 卵の落下（だんだん加速する＝重力）
  for(const e of eggs){
    e.vy += 0.35;
    e.y += e.vy;
  }

  // 対象の移動
  for(const t of targets){
    if(t.dead){ t.deadTimer += dt; continue; }
    t.x += t.dir * t.speed;
  }

  // 当たり判定（卵 × 生きている対象）
  for(const e of eggs){
    if(e.hit) continue;
    for(const t of targets){
      if(t.dead) continue;
      if(e.x > t.x - t.w/2 && e.x < t.x + t.w/2 &&
         e.y > t.y - t.h/2 && e.y < t.y + t.h/2){
        // ヒット！
        e.hit = true;
        t.dead = true; t.deadTimer = 0;
        score += t.kind.points;
        timeLeft = Math.min(30, timeLeft + t.kind.points * 0.1);  // 時間追加（最大30秒）
        makeSplat(e.x, e.y, true);          // 人・車にベチョッ
        pops.push({ text:`+${t.kind.points}`, x:t.x, y:t.y-20, life:0.9, color:"#ffeb3b" });
        pops.push({ text:`+${(t.kind.points*0.1).toFixed(1)}秒`, x:t.x, y:t.y-44, life:0.9, color:"#7CFC00" });
        nextLevelCheck();
        break;
      }
    }
  }

  // 卵の片付け（当たった or 地面に到達）
  eggs = eggs.filter(e=>{
    if(e.hit) return false;
    if(e.y >= ROAD_BOTTOM){
      // 道路に落ちて割れた → 外したので -5点・-0.5秒
      score = Math.max(0, score - 5);
      timeLeft = Math.max(0, timeLeft - 1);
      makeSplat(e.x, ROAD_BOTTOM-4, false);
      pops.push({ text:"-5", x:e.x, y:ROAD_BOTTOM-30, life:1.0, color:"#ff5252" });
      pops.push({ text:"-1秒", x:e.x, y:ROAD_BOTTOM-54, life:1.0, color:"#ff5252" });
      return false;
    }
    return true;
  });

  // 割れた卵の跡（だんだん薄く）
  for(const s of splats){ s.life -= dt/1000; }
  splats = splats.filter(s=>s.life > 0);

  // 死んだ対象の片付け（演出後に消す）、画面外も消す
  targets = targets.filter(t=>{
    if(t.dead) return t.deadTimer < 700;       // 0.7秒「うぎゃ」を表示
    return t.x > -t.w*2 && t.x < W + t.w*2;     // 画面外で消す
  });

  // ポップの寿命
  for(const p of pops){ p.life -= dt/1000; p.y -= 0.4; }
  pops = pops.filter(p=>p.life > 0);

  // 出現（通常）
  spawnTimer += dt;
  if(spawnTimer >= cfg.spawnEvery){
    spawnTimer = 0;
    spawnTarget();
  }
  // 警察（このステージ1人）
  if(policeCountdown > 0){
    policeCountdown -= dt;
    if(policeCountdown <= 0) spawnTarget("police");
  }
  // 市長（超レア）
  if(mayorCountdown > 0){
    mayorCountdown -= dt;
    if(mayorCountdown <= 0) spawnTarget("mayor");
  }
}

// ステージごとの時間帯テーマ（5レベルごとに移り変わる）
const THEMES = [
  { name:"朝",   top:"#ffe0a3", bot:"#fff3e0", sun:"#fff0c0", sunY:90,  ambient:null, stars:false, cloud:"rgba(255,255,255,.9)" },
  { name:"昼",   top:"#5fb6e6", bot:"#cfeefb", sun:"#fffae0", sunY:70,  ambient:null, stars:false, cloud:"rgba(255,255,255,.9)" },
  { name:"夕方", top:"#ff8a5b", bot:"#ffd9a0", sun:"#ff5a2b", sunY:150, ambient:"rgba(255,120,40,.18)", stars:false, cloud:"rgba(255,220,190,.85)" },
  { name:"夕暮", top:"#6b4a8f", bot:"#e08aa8", sun:"#ff7e9d", sunY:170, ambient:"rgba(80,40,110,.25)", stars:true, cloud:"rgba(220,190,210,.7)" },
  { name:"夜",   top:"#0e1a40", bot:"#2a3f73", sun:"#f4f0d0", sunY:80,  ambient:"rgba(10,15,45,.4)", stars:true, cloud:"rgba(180,190,220,.5)" },
];
function getTheme(lv){ return THEMES[(lv-1) % THEMES.length]; }

// =========================================================
//  描画
// =========================================================
function draw(){
  const theme = getTheme(level);

  // 空
  ctx.clearRect(0,0,W,H);
  const sky = ctx.createLinearGradient(0,0,0,ROAD_TOP);
  sky.addColorStop(0, theme.top);
  sky.addColorStop(1, theme.bot);
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,W,ROAD_TOP);

  // 星（夜・夕暮のみ）
  if(theme.stars){
    ctx.fillStyle = "#fff";
    for(let i=0;i<40;i++){
      const sx = (i*137.5)%W, sy = (i*89.3)%200 + 10;
      const tw = 0.4 + 0.6*Math.abs(Math.sin(clock/600 + i));
      ctx.globalAlpha = tw;
      ctx.fillRect(sx, sy, 2, 2);
    }
    ctx.globalAlpha = 1;
  }

  // 太陽 / 月
  ctx.fillStyle = theme.sun;
  ctx.beginPath(); ctx.arc(W-130, theme.sunY, 34, 0, Math.PI*2); ctx.fill();
  if(theme.name==="夜"){ // 月の影で三日月っぽく
    ctx.fillStyle = theme.top;
    ctx.beginPath(); ctx.arc(W-118, theme.sunY-8, 30, 0, Math.PI*2); ctx.fill();
  }

  // ゆっくり流れる雲
  ctx.fillStyle = theme.cloud;
  const cloudShift = (clock*0.01) % (W+200) - 100;
  for(const c of [{x:0,y:60,s:1},{x:420,y:40,s:1.3},{x:760,y:90,s:0.9}]){
    const cx = (c.x + cloudShift) % (W+200) - 100;
    drawCloud(cx, c.y, c.s);
  }

  drawBuildings();
  drawRoad();

  // 対象
  for(const t of targets) drawTarget(t);

  // 割れた卵（目玉焼き風）の跡
  for(const s of splats) drawSplat(s);

  drawHero();

  // 卵
  for(const e of eggs) drawEgg(e);

  // ポップ
  for(const p of pops) drawPop(p);

  // 時間帯の空気感（夕方・夜は全体を色づけ）
  if(theme.ambient){
    ctx.fillStyle = theme.ambient;
    ctx.fillRect(0, 0, W, H);
  }

  drawHUD();
}

// ふわふわした雲
function drawCloud(x, y, s){
  ctx.save();
  ctx.translate(x, y); ctx.scale(s, s);
  ctx.beginPath();
  ctx.arc(0,0,18,0,Math.PI*2);
  ctx.arc(22,-6,22,0,Math.PI*2);
  ctx.arc(48,0,18,0,Math.PI*2);
  ctx.arc(24,10,20,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

// 窓を1枚描く（ガラスの反射つき）
function drawWindow(x, y, w, h, frame){
  ctx.fillStyle = frame || "#3a4a6a";
  ctx.fillRect(x-3, y-3, w+6, h+6);              // 窓枠
  const g = ctx.createLinearGradient(x, y, x+w, y+h);
  g.addColorStop(0, "#bfe6f2");
  g.addColorStop(0.5, "#7fb9d6");
  g.addColorStop(1, "#5f9bc0");
  ctx.fillStyle = g;
  ctx.fillRect(x, y, w, h);                       // ガラス
  // 斜めの反射ライン
  ctx.strokeStyle = "rgba(255,255,255,.55)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x+w*0.15, y+h); ctx.lineTo(x+w*0.45, y);
  ctx.moveTo(x+w*0.5,  y+h); ctx.lineTo(x+w*0.8,  y);
  ctx.stroke();
}

// レンガのテクスチャ（横目地＋互い違いの縦目地）を塗る
function brickTexture(x, y, w, h, light){
  ctx.save();
  ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip();
  ctx.strokeStyle = light ? "rgba(255,255,255,.12)" : "rgba(110,55,45,.4)";
  ctx.lineWidth = 1;
  const rowH = 11, brickW = 26;
  let row = 0;
  for(let yy=y; yy<y+h; yy+=rowH, row++){
    ctx.beginPath(); ctx.moveTo(x, yy); ctx.lineTo(x+w, yy); ctx.stroke();
    const off = (row % 2) * (brickW/2);
    for(let xx=x+off; xx<x+w; xx+=brickW){
      ctx.beginPath(); ctx.moveTo(xx, yy); ctx.lineTo(xx, yy+rowH); ctx.stroke();
    }
  }
  ctx.restore();
}

// 上部がアーチの窓
function drawArchWindow(x, y, w, h, frame){
  ctx.fillStyle = frame || "#6a3d36";
  // 枠（下は四角、上は半円）
  ctx.beginPath();
  ctx.moveTo(x-4, y+h+4); ctx.lineTo(x-4, y+w/2);
  ctx.arc(x+w/2, y+w/2, w/2+4, Math.PI, 0);
  ctx.lineTo(x+w+4, y+h+4); ctx.closePath(); ctx.fill();
  // ガラス
  const g = ctx.createLinearGradient(x, y, x+w, y+h);
  g.addColorStop(0, "#bfe6f2"); g.addColorStop(0.5, "#7fb9d6"); g.addColorStop(1, "#5f9bc0");
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(x, y+h); ctx.lineTo(x, y+w/2);
  ctx.arc(x+w/2, y+w/2, w/2, Math.PI, 0);
  ctx.lineTo(x+w, y+h); ctx.closePath(); ctx.fill();
  // 反射ライン
  ctx.strokeStyle = "rgba(255,255,255,.5)"; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x+w*0.2, y+h); ctx.lineTo(x+w*0.5, y+w*0.3);
  ctx.moveTo(x+w*0.55, y+h); ctx.lineTo(x+w*0.82, y+w*0.5);
  ctx.stroke();
}

// 背景のビル群（シンプソンズ風のレンガ調・リッチに）
function drawBuildings(){
  const roofTop = ROOF_Y + hero.h - 8;   // 主人公が立つビルの屋上ライン

  // --- 左奥のビル（紫の3階建て＋非常階段）---
  const lw = 120, lTop = roofTop-130;
  ctx.fillStyle = "#a87fa4"; ctx.fillRect(0, lTop, lw, ROAD_TOP-lTop);
  brickTexture(0, lTop, lw, ROAD_TOP-lTop, false);
  ctx.fillStyle = "#8a6688"; ctx.fillRect(0, lTop, lw, 10);  // パラペット
  for(let r=0;r<4;r++) for(let c=0;c<2;c++)
    drawWindow(18+c*54, lTop+22+r*52, 36, 34, "#6e4f6c");
  // 非常階段（鉄骨）
  ctx.strokeStyle = "rgba(40,40,50,.7)"; ctx.lineWidth = 2;
  for(let r=0;r<3;r++){
    const fy = lTop+30+r*52;
    ctx.strokeRect(8, fy+30, lw-30, 6);                 // 踊り場
    ctx.beginPath(); ctx.moveTo(8,fy+36); ctx.lineTo(8,fy+58);
    ctx.moveTo(lw-22,fy+36); ctx.lineTo(lw-22,fy+58); ctx.stroke(); // 手すり
    ctx.beginPath(); ctx.moveTo(20,fy+36); ctx.lineTo(40,fy+58); ctx.stroke(); // はしご
  }

  // --- 右奥のビル（ベージュ・石造り風）---
  const rw = 110, rTop = roofTop-80;
  ctx.fillStyle = "#d8c9a3"; ctx.fillRect(W-rw, rTop, rw, ROAD_TOP-rTop);
  ctx.strokeStyle = "rgba(150,130,90,.5)"; ctx.lineWidth = 1; // 石の目地
  for(let y=rTop+18; y<ROAD_TOP; y+=20){ ctx.beginPath(); ctx.moveTo(W-rw,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.fillStyle = "#c2b187"; ctx.fillRect(W-rw, rTop, rw, 12);
  for(let r=0;r<3;r++) for(let c=0;c<2;c++)
    drawWindow(W-rw+16+c*52, rTop+26+r*56, 34, 40, "#9a8a5c");

  // --- 中央：市庁舎風レンガビル ---
  const bx = 120, bw = W-230;
  const bgrad = ctx.createLinearGradient(0, roofTop, 0, ROAD_TOP);
  bgrad.addColorStop(0, "#cc8474"); bgrad.addColorStop(1, "#b3645a");
  ctx.fillStyle = bgrad;
  ctx.fillRect(bx, roofTop, bw, ROAD_TOP-roofTop);
  brickTexture(bx, roofTop, bw, ROAD_TOP-roofTop, false);

  // 角の石積み（クォイン）
  ctx.fillStyle = "#e6d7b8";
  for(let yy=roofTop; yy<ROAD_TOP; yy+=28){
    ctx.fillRect(bx, yy+2, 16, 22);
    ctx.fillRect(bx+bw-16, yy+2, 16, 22);
  }

  // 屋上の石のコーニス（軒飾り）
  ctx.fillStyle = "#e6d7b8"; ctx.fillRect(bx-10, roofTop-18, bw+20, 18);
  ctx.fillStyle = "#cdbd96"; ctx.fillRect(bx-10, roofTop-6, bw+20, 6);
  ctx.fillStyle = "#bda874";
  for(let xx=bx; xx<bx+bw; xx+=22){ ctx.fillRect(xx, roofTop-12, 14, 6); } // 歯飾り

  // 2階：アーチ窓を並べる
  const winY = roofTop + 16;
  const cols = 5, gap = bw/cols;
  for(let i=0;i<cols;i++){
    const wx = bx + gap*i + gap/2 - 24;
    drawArchWindow(wx, winY+24, 48, 56, "#6a3d36");
    // 窓の上の石のまぐさ
    ctx.fillStyle = "#e6d7b8";
    ctx.beginPath(); ctx.arc(wx+24, winY+24+24, 30, Math.PI, 0); ctx.fill();
    ctx.fillStyle = bgrad;
    ctx.beginPath(); ctx.arc(wx+24, winY+24+24, 24, Math.PI, 0); ctx.fill();
  }

  // 中央の看板（SPRINGFIELD）
  const sgnW = 240, sgnX = bx+bw/2-sgnW/2, sgnY = winY+118;
  ctx.fillStyle = "#1c1c1c"; ctx.fillRect(sgnX-4, sgnY-4, sgnW+8, 32);
  ctx.fillStyle = "#f3ead0"; ctx.fillRect(sgnX, sgnY, sgnW, 24);
  ctx.fillStyle = "#7a1f1f";
  ctx.font = "bold 15px sans-serif";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText("SPRINGFIELD MUNICIPAL", bx+bw/2, sgnY+12);
  ctx.textBaseline = "alphabetic";

  // 1階：柱つきの入口＋三角ペディメント
  const dY = sgnY+32;
  if(dY < ROAD_TOP-6){
    const dW = 110, dx = bx+bw/2-dW/2;
    // 三角ペディメント（屋根飾り）
    ctx.fillStyle = "#e6d7b8";
    ctx.beginPath();
    ctx.moveTo(dx-12, dY+10); ctx.lineTo(bx+bw/2, dY-12); ctx.lineTo(dx+dW+12, dY+10);
    ctx.closePath(); ctx.fill();
    // 石の土台＆柱
    ctx.fillStyle = "#e6d7b8"; ctx.fillRect(dx-12, dY+8, dW+24, ROAD_TOP-dY-8);
    ctx.fillStyle = "#d4c49e";
    for(const cxp of [dx-6, dx+dW-10]) ctx.fillRect(cxp, dY+14, 14, ROAD_TOP-dY-14);
    // 観音扉
    ctx.fillStyle = "#6a3d36"; ctx.fillRect(dx+14, dY+16, dW-28, ROAD_TOP-dY-16);
    ctx.fillStyle = "#9bd0e0";
    ctx.fillRect(dx+18, dY+20, (dW-44)/2, ROAD_TOP-dY-26);
    ctx.fillRect(dx+dW/2+2, dY+20, (dW-44)/2, ROAD_TOP-dY-26);
    ctx.fillStyle = "#d4b840"; // 取っ手
    ctx.fillRect(dx+dW/2-3, dY+44, 3, 14); ctx.fillRect(dx+dW/2+2, dY+44, 3, 14);
  }

  // 1階の窓に赤い日よけ（オーニング）
  for(const ax of [bx+40, bx+bw-90]){
    if(dY < ROAD_TOP-30){
      ctx.fillStyle = "#9bd0e0"; ctx.fillRect(ax, dY+24, 50, ROAD_TOP-dY-24);
      ctx.fillStyle = "#c0392b";
      ctx.beginPath(); ctx.moveTo(ax-6, dY+22); ctx.lineTo(ax+56, dY+22);
      ctx.lineTo(ax+48, dY+40); ctx.lineTo(ax+2, dY+40); ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#e9e0cf";  // ストライプ
      for(let i=0;i<3;i++) ctx.fillRect(ax+4+i*18, dY+24, 8, 15);
    }
  }

  // 街灯（左側）
  ctx.strokeStyle = "#2f2f3a"; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(70, ROAD_TOP); ctx.lineTo(70, roofTop-30); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(70, roofTop-30); ctx.lineTo(95, roofTop-44); ctx.stroke();
  ctx.fillStyle = "#ffe9a8";
  ctx.beginPath(); ctx.ellipse(98, roofTop-44, 8, 6, 0, 0, Math.PI*2); ctx.fill();
}

// 道路
function drawRoad(){
  ctx.fillStyle = "#5a5d66";
  ctx.fillRect(0, ROAD_TOP, W, H - ROAD_TOP);

// 主人公（8歳の男の子・シンプソンズ風／黄色い肌＋トゲ髪）
function drawHero(){
  const x = hero.x, y = hero.y;
  const SKIN = "#ffd11a", SKIN_D = "#e6b800";
  const swing = Math.sin(hero.walkPhase) * 10;  // 歩行の足振り
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(hero.face, 1);   // 向きで左右反転

  // 影
  ctx.fillStyle = "rgba(0,0,0,.18)";
  ctx.beginPath(); ctx.ellipse(0, hero.h+2, 26, 7, 0, 0, Math.PI*2); ctx.fill();

  // 脚（前後に振る）
  ctx.fillStyle = "#2f4f8a";
  ctx.save(); ctx.translate(-7, 46); ctx.rotate(swing*0.018);
    ctx.fillRect(-5, 0, 11, 22); ctx.restore();
  ctx.save(); ctx.translate(7, 46); ctx.rotate(-swing*0.018);
    ctx.fillRect(-5, 0, 11, 22); ctx.restore();
  // 靴
  ctx.fillStyle = "#fff";
  ctx.fillRect(-7+swing*0.18-6, 66, 14, 6);
  ctx.fillRect(7-swing*0.18-6, 66, 14, 6);

  // 体（赤いTシャツ）
  ctx.fillStyle = "#e8412e";
  roundRect(-17, 18, 34, 32, 6); ctx.fill();
  ctx.fillStyle = "rgba(255,255,255,.15)";
  roundRect(-17, 18, 12, 32, 6); ctx.fill();

  // 後ろ腕
  ctx.fillStyle = SKIN; ctx.strokeStyle = SKIN_D; ctx.lineWidth = 1.5;
  ctx.save(); ctx.translate(-14, 22); ctx.rotate(-swing*0.02);
    roundRect(-4, 0, 8, 22, 4); ctx.fill(); ctx.stroke(); ctx.restore();

  // 顔（横を向いた卵型）
  ctx.fillStyle = SKIN; ctx.strokeStyle = SKIN_D; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.ellipse(2, 6, 15, 14, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  // 鼻（横向き）
  ctx.fillStyle = SKIN;
  ctx.beginPath(); ctx.ellipse(16, 8, 5, 4, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  // トゲトゲ髪
  ctx.fillStyle = "#3a2a14"; ctx.beginPath();
  ctx.moveTo(-13, -2);
  for(let i=0;i<6;i++){ const px=-13+i*5; ctx.lineTo(px+2, -14); ctx.lineTo(px+5, -3); }
  ctx.lineTo(13, 0); ctx.closePath(); ctx.fill();
  // 目（大きい白目＋黒目）
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.arc(9, 3, 6, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = "#333"; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = "#222";
  ctx.beginPath(); ctx.arc(11, 3, 2.2, 0, Math.PI*2); ctx.fill();
  // 口
  ctx.strokeStyle = "#9a6a00"; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(10, 12, 4, 0.1, Math.PI*0.7); ctx.stroke();

  // 前腕（卵を落とす時に前へ）
  const raise = hero.armRaise > 0 ? 1 : 0;
  ctx.fillStyle = SKIN; ctx.strokeStyle = SKIN_D; ctx.lineWidth = 1.5;
  ctx.save(); ctx.translate(12, 24); ctx.rotate(0.5 + raise*0.7);
    roundRect(-4, 0, 8, 22, 4); ctx.fill(); ctx.stroke();
    ctx.fillStyle = SKIN; ctx.beginPath(); ctx.arc(0, 23, 5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.restore();

  ctx.restore();
}

// 卵
function drawEgg(e){

  ctx.strokeStyle = "#e6dcaf";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(e.x, e.y, e.r, e.r*1.25, 0, 0, Math.PI*2);

}

// 回転するタイヤ（スポークつき）
function drawWheel(cx, cy, r, spin){
  ctx.fillStyle = "#222";
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#888";
  ctx.beginPath(); ctx.arc(cx, cy, r*0.45, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = "#555"; ctx.lineWidth = 2;
  for(let i=0;i<4;i++){
    const a = spin + i*Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(a)*r*0.9, cy + Math.sin(a)*r*0.9);
    ctx.stroke();
  }
}

// シンプソンズ風の人を1人描く（顔は横向き）。step=歩行位相
function drawPerson(shirt, pants, hair, step, riding){
  const SKIN = "#ffd11a", SKIN_D = "#e6b800";
  const sw = Math.sin(step) * (riding ? 0 : 9);
  // 脚
  ctx.fillStyle = pants;
  if(riding){
    // 自転車・スクーターは脚を曲げて固定気味
    ctx.save(); ctx.translate(-4, 12); ctx.rotate(0.5 + Math.sin(step)*0.15);
      ctx.fillRect(-4,0,8,16); ctx.restore();
    ctx.save(); ctx.translate(4, 12); ctx.rotate(0.5 - Math.sin(step)*0.15);
      ctx.fillRect(-4,0,8,16); ctx.restore();
  } else {
    ctx.save(); ctx.translate(-3, 12); ctx.rotate(sw*0.03);
      ctx.fillRect(-4,0,8,18); ctx.restore();
    ctx.save(); ctx.translate(3, 12); ctx.rotate(-sw*0.03);
      ctx.fillRect(-4,0,8,18); ctx.restore();
    ctx.fillStyle = "#3a2a1a";
    ctx.fillRect(-3+sw*0.5-5, 29, 11, 5);
    ctx.fillRect(3-sw*0.5-5, 29, 11, 5);
  }
  // 胴
  ctx.fillStyle = shirt;
  roundRect(-11, -8, 22, 22, 5); ctx.fill();
  // 腕
  ctx.fillStyle = SKIN; ctx.strokeStyle = SKIN_D; ctx.lineWidth = 1.2;
  ctx.save(); ctx.translate(7, -5); ctx.rotate(riding? 0.9 : -sw*0.04+0.2);
    roundRect(-3,0,6,16,3); ctx.fill(); ctx.stroke(); ctx.restore();
  // 頭（横向きの卵型＋鼻）
  ctx.fillStyle = SKIN;
  ctx.beginPath(); ctx.ellipse(1, -16, 10, 9, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(11, -15, 3.5, 3, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  // 髪
  ctx.fillStyle = hair;
  ctx.beginPath(); ctx.arc(0, -19, 10, Math.PI*1.05, Math.PI*1.95); ctx.fill();
  ctx.fillRect(-9, -22, 8, 6);
  // 目
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.arc(6, -16, 4, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = "#444"; ctx.lineWidth = 0.8; ctx.stroke();
  ctx.fillStyle = "#222";
  ctx.beginPath(); ctx.arc(7.5, -16, 1.5, 0, Math.PI*2); ctx.fill();
}

// 行き交う対象
function drawTarget(t){
  const x = t.x, y = t.y;
  if(t.dead) return;   // 当たったら表示しない（卵の割れ跡＋得点だけ見せる）

  const w=t.w, h=t.h, type=t.kind.type;
  const spin = (x / 14) * (t.dir>0?1:-1);   // 進む向きにタイヤが回る
  const step = x / 8;                         // 歩行・ペダル位相

  ctx.save();
  ctx.translate(x, y);
  if(t.dir < 0) ctx.scale(-1, 1);   // 進行方向へ向ける

  // 影
  ctx.fillStyle = "rgba(0,0,0,.18)";
  ctx.beginPath(); ctx.ellipse(0, h/2+2, w/2*0.8, 6, 0, 0, Math.PI*2); ctx.fill();

  if(type==="walker"){
    ctx.save(); ctx.translate(0, h/2-34); drawPerson("#3b7fd6","#27408b","#5a3a1a", step, false); ctx.restore();

  } else if(type==="madam"){
    // マダム：ピンクのワンピース・白髪まとめ髪・真珠
    ctx.save(); ctx.translate(0, h/2-34);
    drawPerson("#e85b9c","#c23b7a","#cfcfcf", step, false);
    // 大きなまとめ髪
    ctx.fillStyle = "#cfcfcf";
    ctx.beginPath(); ctx.arc(-2, -26, 8, 0, Math.PI*2); ctx.fill();
    // 真珠のネックレス
    ctx.fillStyle = "#fff";
    for(let i=0;i<4;i++){ ctx.beginPath(); ctx.arc(-6+i*4, -4, 1.6, 0, Math.PI*2); ctx.fill(); }
    ctx.restore();

  } else if(type==="police"){
    // 警察：紺の制服・帽子・バッジ
    ctx.save(); ctx.translate(0, h/2-34);
    drawPerson("#26417a","#1a2e57","#2a2a2a", step, false);
    // 警官帽
    ctx.fillStyle = "#1c2d52";
    ctx.fillRect(-10, -28, 22, 7);                 // つば
    roundRect(-9, -36, 18, 9, 3); ctx.fill();      // 帽子本体
    ctx.fillStyle = "#d4b840"; ctx.fillRect(-3, -33, 6, 4); // 金バッジ
    // 胸のバッジ
    ctx.fillStyle = "#ffd23f";
    ctx.beginPath(); ctx.arc(-6, -2, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.restore();

  } else if(type==="mayor"){
    // 市長：スーツ・タスキ・シルクハット
    ctx.save(); ctx.translate(0, h/2-38);
    drawPerson("#2b2b3a","#1f1f2b","#3a2a1a", step, false);
    // タスキ（赤）
    ctx.strokeStyle = "#d4203a"; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(-10, -8); ctx.lineTo(9, 12); ctx.stroke();
    // シルクハット
    ctx.fillStyle = "#1a1a1a";
    ctx.fillRect(-12, -27, 24, 5);                 // つば
    ctx.fillRect(-8, -44, 16, 18);                 // 筒
    ctx.fillStyle = "#d4203a"; ctx.fillRect(-8, -30, 16, 3); // リボン
    // 立派な口ひげ
    ctx.fillStyle = "#3a2a1a";
    ctx.fillRect(2, -10, 10, 3);
    ctx.restore();

  } else if(type==="skater"){
    // スケーターボーイ：スケボーに乗って前傾、車輪が回る
    const r=6;
    ctx.fillStyle = "#5a3a1a";                      // デッキ
    roundRect(-22, h/2-10, 44, 6, 3); ctx.fill();
    drawWheel(-14, h/2-2, r, spin); drawWheel(14, h/2-2, r, spin);
    ctx.save(); ctx.translate(0, h/2-44); ctx.rotate(0.12);  // 前傾姿勢
    drawPerson("#ff9f1c","#2e8b57","#1a1a1a", step*1.4, false);
    // キャップ（つば付き）
    ctx.fillStyle = "#e63946";
    roundRect(-9, -34, 18, 8, 4); ctx.fill();
    ctx.fillRect(6, -28, 12, 4);                    // つば
    ctx.restore();

  } else if(type==="bike"){
    // 自転車
    const r=13, wb=22;
    drawWheel(-wb, h/2-r, r, spin); drawWheel(wb, h/2-r, r, spin);
    ctx.strokeStyle="#2db36b"; ctx.lineWidth=4;
    ctx.beginPath();
    ctx.moveTo(-wb,h/2-r); ctx.lineTo(0,h/2-r-14); ctx.lineTo(wb,h/2-r);
    ctx.lineTo(2,h/2-r-26); ctx.lineTo(-wb+4,h/2-r-14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(wb,h/2-r); ctx.lineTo(wb+6,h/2-r-26); ctx.stroke(); // ハンドル支柱
    ctx.save(); ctx.translate(-2, h/2-r-30); drawPerson("#2db36b","#1c5b3a","#2a2a2a", step, true); ctx.restore();

  } else if(type==="luup"){
    // Luup（電動キックボード）
    const r=11;
    drawWheel(-16, h/2-r, r, spin); drawWheel(16, h/2-r, r, spin);
    ctx.strokeStyle="#ff4da6"; ctx.lineWidth=5;
    ctx.beginPath(); ctx.moveTo(-16,h/2-r); ctx.lineTo(16,h/2-r); ctx.stroke(); // デッキ
    ctx.beginPath(); ctx.moveTo(16,h/2-r); ctx.lineTo(18,h/2-r-34); ctx.lineTo(30,h/2-r-34); ctx.stroke(); // ハンドル
    ctx.save(); ctx.translate(-2, h/2-r-38); drawPerson("#ff7ab8","#7a2a55","#3a2a1a", 0, true); ctx.restore();

  } else if(type==="bus"){
    // バス
    ctx.fillStyle = t.kind.color;
    roundRect(-w/2, -h/2, w, h-8, 10); ctx.fill();
    ctx.fillStyle = "rgba(0,0,0,.12)"; roundRect(-w/2, h/2-16, w, 8, 4); ctx.fill();
    // 窓を連続で
    ctx.fillStyle = "#bfe6f2";
    for(let i=-w/2+14; i<w/2-26; i+=30){ roundRect(i, -h/2+10, 22, 22, 3); ctx.fill(); }
    // フロントガラス
    ctx.fillStyle = "#9bd0e0"; roundRect(w/2-24, -h/2+10, 16, 26, 3); ctx.fill();
    // ライン
    ctx.fillStyle = "#c0392b"; ctx.fillRect(-w/2, 6, w, 6);
    drawWheel(-w/4, h/2-8, 12, spin); drawWheel(w/3, h/2-8, 12, spin);

  } else if(type==="sports"){
    // スポーツカー（低く流線形）
    const g = ctx.createLinearGradient(0,-h/2,0,h/2);
    g.addColorStop(0, "#a85cd1"); g.addColorStop(1, t.kind.color);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(-w/2, h/2);
    ctx.quadraticCurveTo(-w/2, 0, -w/4, -2);
    ctx.quadraticCurveTo(-w/8, -h/2, w/8, -h/2);
    ctx.quadraticCurveTo(w/3, -h/2, w/2-6, 2);
    ctx.lineTo(w/2, h/2); ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#2a2a3a";  // キャビン窓
    ctx.beginPath(); ctx.moveTo(-w/8,-h/2+4); ctx.lineTo(w/8,-h/2+4);
    ctx.lineTo(w/6,-2); ctx.lineTo(-w/6,-2); ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#ffe9a8"; ctx.fillRect(w/2-8, -2, 6, 8); // ヘッドライト
    drawWheel(-w/4, h/2, 13, spin); drawWheel(w/4, h/2, 13, spin);

  } else { // car（普通車・ボンネット＋キャビン）
    const g = ctx.createLinearGradient(0,-h/2,0,h/2);
    g.addColorStop(0, "#ff6b5e"); g.addColorStop(1, t.kind.color);
    ctx.fillStyle = g;
    // 車体下部
    roundRect(-w/2, -8, w, h/2, 8); ctx.fill();
    // キャビン（屋根）
    ctx.beginPath();
    ctx.moveTo(-w/4, -8);
    ctx.quadraticCurveTo(-w/5, -h/2, 0, -h/2);
    ctx.quadraticCurveTo(w/5, -h/2, w/4, -8);
    ctx.closePath(); ctx.fill();
    // 窓
    ctx.fillStyle = "#bfe6f2";
    ctx.beginPath();
    ctx.moveTo(-w/5, -10);
    ctx.quadraticCurveTo(-w/6, -h/2+5, 0, -h/2+5);
    ctx.quadraticCurveTo(w/6, -h/2+5, w/5, -10);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#ffe9a8"; ctx.fillRect(w/2-5, -2, 5, 7); // ヘッドライト
    ctx.fillStyle = "#c0392b"; ctx.fillRect(-w/2, -2, 5, 7);  // テールライト
    drawWheel(-w/4, h/2-4, 12, spin); drawWheel(w/4, h/2-4, 12, spin);
  }

  ctx.restore();
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

// 割れた卵（目玉焼き風のぐちゃっ）
function drawSplat(s){
  ctx.save();
  ctx.translate(s.x, s.y);
  const t = s.life / s.maxLife;            // 1→0
  ctx.globalAlpha = Math.min(1, t*1.6);
  // 飛び散り（最初だけ強く広がる）
  const spread = 1 + (1-t)*0.4;
  const sz = s.size * spread;

  // 白身（デコボコの形）
  ctx.fillStyle = "#fffdf2";
  ctx.strokeStyle = "rgba(220,210,170,.7)";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  const n = s.blob.length;
  for(let i=0;i<=n;i++){
    const a = (i/n)*Math.PI*2;
    const r = sz * s.blob[i % n];
    const px = Math.cos(a)*r, py = Math.sin(a)*r*0.7;  // 横長につぶれる
    if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.closePath(); ctx.fill(); ctx.stroke();

  // 飛び散った小さな白身
  ctx.fillStyle = "#fffdf2";
  for(let i=0;i<4;i++){
    const a = i*1.7 + s.blob[0];
    const d = sz*1.1*spread;
    ctx.beginPath();
    ctx.ellipse(Math.cos(a)*d, Math.sin(a)*d*0.6, 3.5*t+1, 2.5*t+1, 0, 0, Math.PI*2);
    ctx.fill();
  }

  // 垂れ（人・車に当たった時は下にダラッと）
  if(s.onTarget){
    ctx.fillStyle = "#fffdf2";
    s.drips.forEach((dx,i)=>{
      const px = (dx-0.5)*sz*1.2;
      ctx.beginPath();
      ctx.ellipse(px, sz*0.4 + (1-t)*14, 3, 6+(1-t)*8, 0, 0, Math.PI*2);
      ctx.fill();
    });
  }

  // 黄身（目玉焼きの黄色）
  const yolk = ctx.createRadialGradient(-2,-2,1, 0,0, sz*0.45);
  yolk.addColorStop(0, "#ffd24d");
  yolk.addColorStop(1, "#f0a500");
  ctx.fillStyle = yolk;
  ctx.beginPath(); ctx.ellipse(0, 0, sz*0.42, sz*0.32, 0, 0, Math.PI*2); ctx.fill();
  // 黄身のテカリ
  ctx.fillStyle = "rgba(255,255,255,.6)";
  ctx.beginPath(); ctx.ellipse(-sz*0.12, -sz*0.1, sz*0.1, sz*0.07, 0, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

// 得点ポップなど
function drawPop(p){
  ctx.save();
  ctx.globalAlpha = Math.max(0, Math.min(1, p.life*2));
  ctx.textAlign = "center";
  if(p.big){
    ctx.font = "bold 48px sans-serif";
    ctx.fillStyle = p.color;
    ctx.strokeStyle = "#d23"; ctx.lineWidth = 4;
    ctx.strokeText(p.text, p.x, p.y);
    ctx.fillText(p.text, p.x, p.y);
  } else if(p.text==="💥"){
    ctx.font = "26px serif";
    ctx.fillText(p.text, p.x, p.y);
  } else {
    ctx.font = "bold 22px sans-serif";
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.restore();
}

// 角丸バーを描く小道具
function bar(x, y, w, h, ratio, color, bg){
  ctx.fillStyle = bg || "rgba(0,0,0,.35)";
  roundRect(x, y, w, h, h/2); ctx.fill();
  if(ratio > 0){
    ctx.fillStyle = color;
    roundRect(x, y, w*Math.max(0,Math.min(1,ratio)), h, h/2); ctx.fill();
  }
}

// 画面上部の情報表示（中央寄せ・見やすく）
function drawHUD(){
  const cfg = levelConfig(level);
  const got = Math.max(0, score - levelStartScore);
  const cx = W/2;

  ctx.save();
  ctx.textBaseline = "middle";

  // --- 中央の情報パネル ---
  const panelW = 360, px = cx - panelW/2;
  ctx.fillStyle = "rgba(0,0,0,.4)";
  roundRect(px-14, 8, panelW+28, 96, 14); ctx.fill();

  // LEVEL 見出し
  ctx.fillStyle = "#ffd23f";
  ctx.font = "bold 22px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(`LEVEL ${level}`, cx, 26);

  // 残り時間バー
  const tRatio = timeLeft / cfg.time;
  const tColor = tRatio < 0.25 ? "#ff3b3b" : tRatio < 0.5 ? "#ffb300" : "#37c871";
  ctx.fillStyle = "#fff"; ctx.font = "bold 14px sans-serif"; ctx.textAlign = "left";
  ctx.fillText("⏱ 時間", px, 50);
  bar(px+58, 43, panelW-58, 16, tRatio, tColor);
  ctx.fillStyle = "#fff"; ctx.textAlign = "right"; ctx.font = "bold 13px sans-serif";
  ctx.fillText(`${Math.ceil(Math.max(0,timeLeft))}秒`, px+panelW-6, 51);
  // 残りわずかは点滅
  if(tRatio < 0.25 && Math.floor(clock/250)%2===0){
    ctx.fillStyle = "#ff3b3b"; ctx.textAlign="center"; ctx.font="bold 14px sans-serif";
    ctx.fillText("いそげ！", cx, 51);
  }

  // 目標ポイントバー
  const pRatio = got / cfg.target;
  ctx.fillStyle = "#fff"; ctx.textAlign = "left"; ctx.font = "bold 14px sans-serif";
  ctx.fillText("🎯 目標", px, 80);
  bar(px+58, 73, panelW-58, 16, pRatio, "#4da6ff");
  ctx.fillStyle = "#fff"; ctx.textAlign = "right"; ctx.font = "bold 13px sans-serif";
  ctx.fillText(`${got} / ${cfg.target}`, px+panelW-6, 81);

  // --- 左上：トータルスコア　右上：ベスト ---
  ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
  ctx.fillStyle = "rgba(0,0,0,.4)"; roundRect(10, 10, 150, 34, 10); ctx.fill();
  ctx.fillStyle = "#fff"; ctx.font = "bold 20px sans-serif";
  ctx.fillText(`SCORE ${score}`, 22, 34);

  ctx.textAlign = "right";
  ctx.fillStyle = "rgba(0,0,0,.4)"; roundRect(W-160, 10, 150, 34, 10); ctx.fill();
  ctx.fillStyle = "#ffd23f"; ctx.font = "bold 18px sans-serif";
  ctx.fillText(`BEST ${best}`, W-22, 33);

  ctx.restore();
}
